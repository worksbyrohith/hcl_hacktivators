<div class="page-hero">
      <div class="container">
        <h1>Our Medicines</h1>
        <p>Browse our catalog of 500+ verified, authentic medicines for all your health needs.</p>
      </div>
    </div>

    <div class="container page-body fade-in" id="medicine-list-page">
      <div class="filters-bar">
        <div class="search-wrapper">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Search by name or brand..."
            class="form-control search-input"
            (keyup.enter)="loadMedicines()"
            id="medicine-search-input">
          <button class="btn btn-primary search-btn" (click)="loadMedicines()" id="medicine-search-btn">Search</button>
        </div>
        <div class="category-chips">
          <button
            class="chip"
            [class.active]="selectedCategory === ''"
            (click)="setCategory('')"
            id="filter-all">All</button>
          <button
            *ngFor="let cat of categories"
            class="chip"
            [class.active]="selectedCategory === cat"
            (click)="setCategory(cat)">
            {{ cat }}
          </button>
        </div>
      </div>

      <app-loader [show]="loading"></app-loader>

      <div *ngIf="!loading && medicines.length > 0" class="results-info">
        <span>Showing <strong>{{ medicines.length }}</strong> medicine{{ medicines.length === 1 ? '' : 's' }}</span>
        <span *ngIf="selectedCategory" class="active-filter">
          {{ selectedCategory }}
          <button class="clear-filter" (click)="clearFilters()">×</button>
        </span>
      </div>

      <div *ngIf="!loading && medicines.length === 0" class="empty-state fade-in">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <h3>No medicines found</h3>
        <p>Try adjusting your search or category filter.</p>
        <button class="btn btn-secondary" (click)="clearFilters()">Clear All Filters</button>
      </div>

      <div *ngIf="!loading && medicines.length > 0" class="medicine-grid">
        <app-medicine-card *ngFor="let med of medicines" [medicine]="med"></app-medicine-card>
      </div>
    </div>
