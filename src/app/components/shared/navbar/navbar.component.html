<nav class="navbar" id="main-navbar">
      <div class="container nav-container">
        <a routerLink="/" class="brand" id="navbar-brand">
          <img src="/assets/logo.png" alt="Medi-fy Logo" class="app-logo">
          <span class="brand-text">Medi-fy</span>
        </a>

        <!-- Mobile hamburger -->
        <button class="hamburger" (click)="toggleMobile()" [class.active]="showMobile" id="nav-hamburger" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="nav-links" [class.show]="showMobile">
          <a routerLink="/medicines" routerLinkActive="active" class="nav-item" id="nav-medicines" (click)="closeMobile()">Medicines</a>

          <ng-container *ngIf="(authService.currentUser$ | async) as user; else guestLinks">
            <a routerLink="/prescription/status" routerLinkActive="active" class="nav-item" id="nav-prescriptions" (click)="closeMobile()">Prescriptions</a>
            <a routerLink="/orders" routerLinkActive="active" class="nav-item" id="nav-orders" (click)="closeMobile()">Orders</a>

            <ng-container *ngIf="user.role === 'Admin' || user.role === 'Pharmacist'">
              <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item admin-link" id="nav-admin" (click)="closeMobile()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
                {{ user.role === 'Admin' ? 'Admin' : 'Dashboard' }}
              </a>
            </ng-container>

            <a routerLink="/cart" routerLinkActive="active" class="nav-item cart-link" id="nav-cart" (click)="closeMobile()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
              </svg>
              <span class="cart-badge" *ngIf="cartService.getItemCount() > 0">{{ cartService.getItemCount() }}</span>
            </a>

            <div class="user-section">
              <div class="user-avatar">{{ user.name ? user.name.charAt(0).toUpperCase() : 'U' }}</div>
              <div class="user-info">
                <span class="user-name">{{ user.name }}</span>
                <span class="user-role">{{ user.role }}</span>
              </div>
              <button (click)="logout()" class="btn btn-sm btn-ghost logout-btn" id="nav-logout" title="Sign Out">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
              </button>
            </div>
          </ng-container>

          <ng-template #guestLinks>
            <div class="guest-actions">
              <a routerLink="/login" class="btn btn-ghost btn-sm" id="nav-login" (click)="closeMobile()">Sign In</a>
              <a routerLink="/register" class="btn btn-primary btn-sm" id="nav-register" (click)="closeMobile()">Get Started</a>
            </div>
          </ng-template>
        </div>
      </div>
    </nav>
